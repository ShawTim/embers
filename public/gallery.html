<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>KayKit Character Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e14; color: #e8eaed; font-family: -apple-system, sans-serif; }
  h1 { text-align: center; padding: 16px; color: #cca84a; font-size: 22px; }
  .info { max-width: 1400px; margin: 0 auto; padding: 0 20px 12px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .info select { background: rgba(20,28,40,0.9); color: #cde; border: 1px solid rgba(60,80,120,0.4); border-radius: 6px; padding: 8px 12px; font-size: 14px; min-width: 300px; }
  .info .name { font-size: 20px; font-weight: 700; }
  .info .desc { font-size: 14px; color: #8ab; }
  #viewer { width: 100%; height: 65vh; display: block; }
  .hint { text-align: center; font-size: 12px; color: #456; padding: 8px; }
</style>
</head>
<body>
<h1>KayKit Character Gallery — 拖曳旋轉 · 滾輪縮放</h1>
<div class="info">
  <select id="selector"></select>
  <span class="name" id="modelName"></span>
  <span class="desc" id="modelDesc"></span>
</div>
<canvas id="viewer"></canvas>
<div class="hint">點擊下拉選單切換角色 · 左鍵拖曳旋轉 · 右鍵拖曳平移 · 滾輪縮放</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone } from 'three/addons/utils/SkeletonUtils.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const MODELS = [
  { file: "Paladin", tag: "Player — Kael (Lord)", type: "player" },
  { file: "BlackKnight", tag: "Player — Borin / Malachar / Zethar", type: "player" },
  { file: "Witch", tag: "Player — Lyra (Cleric)", type: "player" },
  { file: "MagicalGirl", tag: "Player — Serra (Archer)", type: "player" },
  { file: "Druid", tag: "Player — Maren (Mage)", type: "player" },
  { file: "AvianSwordsman", tag: "Player — Darius (Cavalier)", type: "player" },
  { file: "Protagonist_B", tag: "Player — Yuki (Cavalier)", type: "player" },
  { file: "Protagonist_A", tag: "Alt male protagonist", type: "player" },
  { file: "Lorekeeper", tag: "Scholar / Librarian mage", type: "player" },
  { file: "Ranger", tag: "Archer / Hunter", type: "player" },
  { file: "Cleric", tag: "Holy healer (female)", type: "player" },
  { file: "Marksman", tag: "Sniper / Rifleman", type: "player" },
  { file: "Knight", tag: "Basic knight (male)", type: "player" },
  { file: "Mage", tag: "Basic mage (male)", type: "player" },
  { file: "Rogue", tag: "Basic rogue (male)", type: "player" },
  { file: "Rogue_Hooded", tag: "Hooded rogue", type: "player" },
  { file: "Barbarian", tag: "Barbarian (male)", type: "player" },
  { file: "Paladin_with_Helmet", tag: "Paladin w/ full helmet", type: "player" },
  { file: "Skeleton_Warrior", tag: "Enemy — melee skeleton", type: "enemy" },
  { file: "Skeleton_Mage", tag: "Enemy — magic skeleton", type: "enemy" },
  { file: "Skeleton_Rogue", tag: "Enemy — ranged skeleton", type: "enemy" },
  { file: "Skeleton_Minion", tag: "Enemy — fodder skeleton", type: "enemy" },
  { file: "Vampire", tag: "Boss — Vampire", type: "special" },
  { file: "OrcBrute", tag: "Boss — Orc Brute", type: "special" },
  { file: "FrostGolem", tag: "Boss — Frost Golem", type: "special" },
  { file: "Monstrosity", tag: "Boss — Monstrosity", type: "special" },
  { file: "CombatMech", tag: "Boss — Combat Mech", type: "special" },
  { file: "Werewolf_Man", tag: "Boss — Werewolf (human form)", type: "special" },
  { file: "Werewolf_Wolf", tag: "Boss — Werewolf (wolf form)", type: "special" },
  { file: "Tiefling", tag: "Demon / Tiefling mage", type: "special" },
  { file: "PlantWarrior", tag: "Nature warrior", type: "special" },
  { file: "ToySoldier", tag: "Toy Soldier", type: "special" },
  { file: "4GTN", tag: "Mystery character", type: "special" },
  { file: "4GTN_Forgotten", tag: "Mystery (dark variant)", type: "special" },
  { file: "Clown", tag: "Clown", type: "special" },
  { file: "Superhero", tag: "Superhero", type: "special" },
  { file: "Hiker", tag: "Hiker (modern)", type: "npc" },
  { file: "Caveman", tag: "Caveman", type: "npc" },
  { file: "Clanker", tag: "Steampunk robot", type: "npc" },
  { file: "Robot_One", tag: "Robot A", type: "npc" },
  { file: "Robot_Two", tag: "Robot B", type: "npc" },
  { file: "Animatronic_Creepy", tag: "Animatronic (creepy)", type: "npc" },
  { file: "Animatronic_Normal", tag: "Animatronic (normal)", type: "npc" },
  { file: "Helper_A", tag: "NPC — Helper A", type: "npc" },
  { file: "Helper_B", tag: "NPC — Helper B", type: "npc" },
  { file: "Farmer_A", tag: "NPC — Farmer A", type: "npc" },
  { file: "Farmer_B", tag: "NPC — Farmer B", type: "npc" },
  { file: "Hoarder", tag: "NPC — Hoarder", type: "npc" },
];

const canvas = document.getElementById('viewer');
const selector = document.getElementById('selector');
const nameEl = document.getElementById('modelName');
const descEl = document.getElementById('modelDesc');

const groups = { player: "⚔ 我方角色", enemy: "💀 敵人", special: "👑 Boss / 特殊", npc: "👤 NPC / 其他" };
for (const [type, label] of Object.entries(groups)) {
  const og = document.createElement('optgroup');
  og.label = label;
  for (const m of MODELS.filter(m => m.type === type)) {
    const opt = document.createElement('option');
    opt.value = m.file;
    opt.textContent = m.file + ' — ' + m.tag;
    og.appendChild(opt);
  }
  selector.appendChild(og);
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141a26);
const camera = new THREE.PerspectiveCamera(40, canvas.clientWidth / canvas.clientHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(canvas.clientWidth, canvas.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

scene.add(new THREE.AmbientLight(0xb0c4de, 0.7));
const dl = new THREE.DirectionalLight(0xffe8c0, 1.4);
dl.position.set(3, 5, 3); dl.castShadow = true;
dl.shadow.mapSize.set(1024, 1024);
dl.shadow.camera.left = -3; dl.shadow.camera.right = 3; dl.shadow.camera.top = 3; dl.shadow.camera.bottom = -3;
scene.add(dl);
scene.add(new THREE.DirectionalLight(0x6080a0, 0.4));
scene.add(new THREE.HemisphereLight(0xa0b8d8, 0x3a2818, 0.3));

const ground = new THREE.Mesh(new THREE.CircleGeometry(2, 32), new THREE.MeshStandardMaterial({ color: 0x1a2436, roughness: 0.9 }));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
scene.add(ground);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.1;
controls.minDistance = 2; controls.maxDistance = 10;
controls.target.set(0, 1, 0);

const loader = new GLTFLoader();
let currentModel = null;
const cache = {};

function loadModel(file) {
  nameEl.textContent = file;
  const m = MODELS.find(x => x.file === file);
  descEl.textContent = m ? m.tag : '';
  descEl.style.color = m?.type === 'player' ? '#6af' : m?.type === 'enemy' ? '#f66' : m?.type === 'special' ? '#fa6' : '#888';

  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (cache[file]) { showModel(cache[file]); return; }

  loader.load('/models/characters/' + file + '.glb', (gltf) => {
    const obj = clone(gltf.scene);
    obj.traverse(child => {
      if (child.isMesh) {
        const n = child.name.toLowerCase();
        if (['shield','sword','offhand','bow','staff','wand','dagger','axe','mug','spellbook','crossbow'].some(k => n.includes(k))) child.visible = false;
        else { child.castShadow = true; child.receiveShadow = true; }
      }
    });
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const s = 2.8 / Math.max(size.y, 0.01);
    obj.scale.setScalar(s);
    obj.position.set(-center.x * s, -box.min.y * s + 0.02, -center.z * s);
    cache[file] = obj;
    showModel(obj);
  }, undefined, () => {
    nameEl.textContent = file + ' (LOAD ERROR)';
    nameEl.style.color = '#f66';
  });
}

function showModel(obj) { currentModel = obj; scene.add(obj); }

function onResize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h, false);
}
window.addEventListener('resize', onResize); onResize();

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
animate();

selector.addEventListener('change', () => loadModel(selector.value));
selector.value = 'Paladin';
loadModel('Paladin');
</script>
</body>
</html>
